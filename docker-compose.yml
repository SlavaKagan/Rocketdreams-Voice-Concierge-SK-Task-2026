version: "3.8"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: meridian_db
    environment:
      POSTGRES_USER: meridian
      POSTGRES_PASSWORD: meridian
      POSTGRES_DB: meridian_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meridian -d meridian_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: meridian_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://meridian:meridian@db:5432/meridian_db
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  seeder:
    build: ./backend
    container_name: meridian_seeder
    command: python -m app.services.seed
    environment:
      DATABASE_URL: postgresql://meridian:meridian@db:5432/meridian_db
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      backend:
        condition: service_healthy
    restart: "no"

  agent:
    build: ./agent
    container_name: meridian_agent
    environment:
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      ELEVEN_API_KEY: ${ELEVEN_API_KEY}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY}
      BACKEND_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

  admin:
    build: ./admin
    container_name: meridian_admin
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data: